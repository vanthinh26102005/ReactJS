                <h2>{props.title}</h2>
                <img src={props.image} alt="" />
                <p>{props.description}</p>
                <p>{props.reactionsCount}</p>
            </div>

        )

        //app.js
        function App() {

            return (
                <div id="wrapper">

                        blogs.map(blog => (
                            <BlogItem

                                title = {blog.title}
                                image= {blog.thumbnail_url}
                                description = {blog.description}
                                reactionsCount = {blog.reactions_count}

                            />
                        ))
                    }


                </div>
            )
        }
